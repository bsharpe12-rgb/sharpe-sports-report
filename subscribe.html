<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscribe - Sharpe Sports Report</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="index.html" style="text-decoration: none; color: white;">
            <h1>Sharpe Sports Report</h1>
        </a>
    </header>

    <main>
        <section class="light-zone" style="text-align: center;">
            <h2>Join the Inner Circle</h2>
            <p>Enter your details below to get the latest podcast drops in your inbox.</p>
            
            <form id="subscribeForm" style="max-width: 400px; margin: 0 auto; text-align: left;">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="firstname" placeholder="First Name" required style="width: 100%; padding: 10px; margin: 10px 0;">
                
                <label for="lname">Last Name</label>
                <input type="text" id="lname" name="lastname" placeholder="Last Name" required style="width: 100%; padding: 10px; margin: 10px 0;">

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="email@example.com" required style="width: 100%; padding: 10px; margin: 10px 0;">

                <button type="submit" style="width: 100%;">Subscribe Now</button>
            </form>
            <p style="margin-top: 20px;"><a href="index.html" style="color: #d40000;">← Back to Home</a></p>
        </section>
    </main>

    <script>
        document.getElementById('subscribeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("Thanks for joining, " + document.getElementById('fname').value + "! Check your email soon.");
            window.location.href = "index.html"; // Takes them back home after they click OK
        });
    </script>
</body>
</html>
